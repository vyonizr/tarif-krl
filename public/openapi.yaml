openapi: '3.0.3'
info:
  title: Jadwal KRL (formerly Tarif KRL) API
  version: '1.0.0'
  description: >-
    API for KRL commuter line fares, schedules, and stations, and Jakarta MRT
    fares and routes, used by this app's own frontend. Requests are only
    accepted from this site's origin, direct external access (curl, Postman,
    another site's frontend) is blocked. To call this API from your own project,
    clone the repository and run your own instance against your own upstream
    quota.

servers:
  - url: /api
    description: Same-origin

paths:
  /v1/krl/stations:
    get:
      summary: List stations grouped by region
      responses:
        '200':
          description: OK
          headers:
            X-KRL-Data-Source:
              $ref: '#/components/headers/X-KRL-Data-Source'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationsEnvelope'
              example:
                data:
                  Jabodetabek:
                    - id: 'THB'
                      name: 'Tanah Abang'
                    - id: 'BOO'
                      name: 'Bogor'
                error: null
        '502':
          description: Upstream unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /v1/krl/fare:
    get:
      summary: Get fare between two stations
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
          description: Origin station code
          example: 'THB'
        - name: to
          in: query
          required: true
          schema:
            type: string
          description: Destination station code
          example: 'BOO'
      responses:
        '200':
          description: OK
          headers:
            X-KRL-Data-Source:
              $ref: '#/components/headers/X-KRL-Data-Source'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FareEnvelope'
              example:
                data:
                  - from: 'THB'
                    to: 'BOO'
                    fare: 4000
                    distance: '25-30 KM'
                error: null
        '400':
          description: Missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Upstream unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /v1/krl/route:
    get:
      summary: Get transit route between two stations (streamed)
      description: |
        Finds a route from origin to destination across 1–3 KRL lines, streamed
        progressively as `text/event-stream` (SSE), one hop at a time rather
        than a single blocking response, since upstream schedule lookups for a
        multi-transit trip can take up to ~50s combined. See
        `docs/krl-progressive-route-sdd.md` for the full design.

        Same-line trips resolve as a single hop. Multi-line trips chain hops
        through transfer stations (Manggarai, Tanah Abang, Duri, Kampung Bandan,
        Jakarta Kota), each streamed as soon as it resolves.

        Events, in order, until the stream closes:
        - `leg`: a hop resolved successfully. `data`: `{ index, total, from, to, time, legs: RouteLeg[] }`.
          `legs` has more than one entry only when the upstream API required an
          internal same-line split to cover that hop.
        - `leg-error`: a hop failed. `data`: `{ index, total, from, to, time, error: ErrorBody, blocked }`.
          `blocked: true` means this hop wasn't attempted at all, because an
          earlier hop failed and left no real arrival time to search from
          (rather than guessing one). `total: 0` means the stations aren't
          connected by any KRL line at all, so no hops exist to report.
        - `done`: always the final event. `data`: `{ legsFound, legsFailed, dataSource }`,
          where `dataSource` is `{ source, capturedAt? }`. See the
          `X-KRL-Data-Source` header description on the other endpoints for
          what `source` values mean.

        A failed hop can be retried individually via `GET /v1/krl/route/leg`,
        using the `from`/`to`/`time` from its `leg-error` event.
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
          description: Origin station code
          example: 'THB'
        - name: to
          in: query
          required: true
          schema:
            type: string
          description: Destination station code
          example: 'BOO'
        - name: time
          in: query
          required: false
          schema:
            type: string
            format: 'HH:MM'
          description: 'Departure time (Asia/Jakarta). Defaults to current server time.'
          example: '07:30'
      responses:
        '200':
          description: >-
            SSE stream of `leg` / `leg-error` events followed by a terminal
            `done` event (see description above). Emitted even for a request
            that ultimately finds no route at all.
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: leg
                data: {"index":0,"total":1,"from":"THB","to":"BOO","time":"07:30","legs":[{"train_id":"2734","train_name":"Commuter Line Bogor","color":"#EE1E25","stops":[{"station_id":"THB","station_name":"Tanah Abang","time_est":"07:30"},{"station_id":"BOO","station_name":"Bogor","time_est":"08:45"}]}]}

                event: done
                data: {"legsFound":1,"legsFailed":0,"dataSource":{"source":"repo-snapshot","capturedAt":"2026-06-01T00:00:00.000Z"}}
        '400':
          description: Missing/invalid parameters, or unrecognized station codes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /v1/krl/route/leg:
    get:
      summary: Retry a single hop of a multi-transit route
      description: |
        Resolves exactly one hop (same `from`/`to`/`time` shape as the main
        route search), used to retry a hop reported via `leg-error` on
        `GET /v1/krl/route`, without re-running the whole multi-leg search.
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
          description: Hop origin station code
          example: 'MRI'
        - name: to
          in: query
          required: true
          schema:
            type: string
          description: Hop destination station code
          example: 'THB'
        - name: time
          in: query
          required: true
          schema:
            type: string
            format: 'HH:MM'
          description: Hop departure time, as reported in the original leg-error event
          example: '07:45'
      responses:
        '200':
          description: OK
          headers:
            X-KRL-Data-Source:
              $ref: '#/components/headers/X-KRL-Data-Source'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteEnvelope'
              example:
                data:
                  legs:
                    - train_id: '2734'
                      train_name: 'Commuter Line Bogor'
                      color: '#EE1E25'
                      stops:
                        - station_id: 'MRI'
                          station_name: 'Manggarai'
                          time_est: '07:45'
                        - station_id: 'THB'
                          station_name: 'Tanah Abang'
                          time_est: '08:00'
                error: null
        '400':
          description: Missing/invalid parameters, or unrecognized station codes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: No route found for this hop
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Upstream unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /v1/krl/schedules:
    get:
      summary: Get departure schedules for a station
      parameters:
        - name: station_id
          in: query
          required: true
          schema:
            type: string
          description: Station code
          example: 'THB'
        - name: time_from
          in: query
          required: true
          schema:
            type: string
            format: 'HH:MM'
          description: Start of time window
          example: '07:00'
        - name: time_to
          in: query
          required: false
          schema:
            type: string
            format: 'HH:MM'
            default: '23:00'
          description: End of time window
          example: '09:00'
      responses:
        '200':
          description: OK
          headers:
            X-KRL-Data-Source:
              $ref: '#/components/headers/X-KRL-Data-Source'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulesEnvelope'
              example:
                data:
                  - train_id: '2734'
                    ka_name: 'Commuter Line Bogor'
                    route_name: 'Bogor'
                    dest: 'Bogor'
                    time_est: '07:30'
                    color: '#EE1E25'
                    dest_time: '08:45'
                error: null
        '400':
          description: Missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Upstream unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /lrt/stations:
    get:
      summary: List LRT Jabodebek stations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LrtStationsEnvelope'
              example:
                data:
                  - slug: 'harjamukti'
                    name: 'Harjamukti'
                  - slug: 'dukuh-atas'
                    name: 'Dukuh Atas'
                error: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /lrt/schedule:
    get:
      summary: Get departure schedule for an LRT station
      parameters:
        - name: station
          in: query
          required: true
          schema:
            type: string
          description: Station slug
          example: 'harjamukti'
        - name: day
          in: query
          required: true
          schema:
            type: string
            enum: [weekday, holiday]
          description: Day type
          example: 'weekday'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LrtScheduleEnvelope'
              example:
                data:
                  times: ['05:00', '05:30', '06:00']
                  capturedAt: '2026-06-01T00:00:00.000Z'
                error: null
        '400':
          description: Missing/invalid parameters, or unrecognized station
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: No schedule snapshot for this station
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /lrt/journey:
    get:
      summary: Get journey (direct or transfer) between two LRT stations
      description: |
        Resolves a journey along the LRT Jabodebek line topology. Stations on
        the same branch (or trunk) resolve as a single `direct` journey.
        Stations on opposite branches (Cibubur vs. Bekasi) resolve as a
        `transfer` journey through the Cawang fork point, made up of two
        direct legs.
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
          description: Origin station slug
          example: 'harjamukti'
        - name: to
          in: query
          required: true
          schema:
            type: string
          description: Destination station slug
          example: 'dukuh-atas'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LrtJourneyEnvelope'
              example:
                data:
                  type: 'direct'
                  from: 'harjamukti'
                  fromName: 'Harjamukti'
                  to: 'dukuh-atas'
                  toName: 'Dukuh Atas'
                  headingTowards: 'Dukuh Atas'
                  schedule:
                    weekday: ['05:00', '05:30', '06:00']
                    holiday: ['05:30', '06:00']
                    capturedAt: '2026-06-01T00:00:00.000Z'
                error: null
        '400':
          description: Missing/invalid parameters, same from/to, or unrecognized station
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mrt/stations:
    get:
      summary: List MRT stations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MrtStationsEnvelope'
              example:
                data:
                  - id: 1
                    slug: 'lebak-bulus'
                    name: 'Lebak Bulus Grab'
                  - id: 13
                    slug: 'bundaran-hi'
                    name: 'Bundaran HI Bank DKI'
                error: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mrt/fare:
    get:
      summary: Get fare, direction, and schedule between two MRT stations
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: integer
          description: Origin station id
          example: 1
        - name: to
          in: query
          required: true
          schema:
            type: integer
          description: Destination station id
          example: 13
        - name: datetime
          in: query
          required: false
          schema:
            type: string
          description: Departure datetime passed through to the upstream MRT API
          example: '2026-06-01 07:30:00'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MrtFareEnvelope'
              example:
                data:
                  fare: 14000
                  timeEstimation: 30
                  direction:
                    start: 'Lebak Bulus Grab'
                    end: 'Bundaran HI Bank DKI'
                  headingTowards: 'Bundaran HI Bank DKI'
                  schedule:
                    weekdays: ['05:00', '05:10', '05:20']
                    weekends: ['05:30', '05:50']
                error: null
        '400':
          description: Missing required parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  headers:
    X-KRL-Data-Source:
      description: >-
        Which tier served this response: `live` (fresh upstream fetch, used
        only by `/v1/krl/stations` and `/v1/krl/fare`) or `repo-snapshot`
        (the repo-committed snapshot, refreshed via `npm run
        snapshot:refresh`, used by `/v1/krl/schedules` and
        `/v1/krl/route*`). A `; captured-at=<ISO timestamp>` suffix is
        appended for the latter.
      schema:
        type: string

  schemas:
    # ── KRL Station ──────────────────────────────────────
    Station:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id, name]

    StationsData:
      type: object
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/Station'

    StationsEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/StationsData'
        error:
          type: 'null'
      required: [data, error]

    # ── KRL Fare ─────────────────────────────────────────
    FareItem:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        fare:
          type: integer
        distance:
          type: string
      required: [from, to, fare, distance]

    FareEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FareItem'
        error:
          type: 'null'
      required: [data, error]

    # ── KRL Schedule ──────────────────────────────────────
    ScheduleItem:
      type: object
      properties:
        train_id:
          type: string
        ka_name:
          type: string
        route_name:
          type: string
        dest:
          type: string
        time_est:
          type: string
        color:
          type: string
        dest_time:
          type: string
      required: [train_id, ka_name, route_name, dest, time_est, color, dest_time]

    SchedulesEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleItem'
        error:
          type: 'null'
      required: [data, error]

    # ── KRL Route ────────────────────────────────────────
    RouteStop:
      type: object
      properties:
        station_id:
          type: string
        station_name:
          type: string
        time_est:
          type: string
      required: [station_id, station_name, time_est]

    RouteLeg:
      type: object
      properties:
        train_id:
          type: string
        train_name:
          type: string
        color:
          type: string
        stops:
          type: array
          items:
            $ref: '#/components/schemas/RouteStop'
      required: [train_id, train_name, color, stops]

    RouteData:
      type: object
      properties:
        legs:
          type: array
          items:
            $ref: '#/components/schemas/RouteLeg'
      required: [legs]

    RouteEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/RouteData'
        error:
          type: 'null'
      required: [data, error]

    # ── LRT Station ──────────────────────────────────────
    LrtStation:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
      required: [slug, name]

    LrtStationsEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LrtStation'
        error:
          type: 'null'
      required: [data, error]

    # ── LRT Schedule ─────────────────────────────────────
    LrtScheduleEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            times:
              type: array
              items:
                type: string
              description: Departure times (HH:MM) for the requested day type
            capturedAt:
              type: string
              description: When this snapshot was captured from the upstream schedule
          required: [times, capturedAt]
        error:
          type: 'null'
      required: [data, error]

    # ── LRT Journey ──────────────────────────────────────
    LrtDirectJourney:
      type: object
      properties:
        type:
          type: string
          enum: [direct]
        from:
          type: string
        fromName:
          type: string
        to:
          type: string
        toName:
          type: string
        headingTowards:
          type: string
        schedule:
          type: object
          properties:
            weekday:
              type: array
              items:
                type: string
            holiday:
              type: array
              items:
                type: string
            capturedAt:
              type: string
              description: When this snapshot was captured from the upstream schedule
          required: [weekday, holiday, capturedAt]
      required: [type, from, fromName, to, toName, headingTowards, schedule]

    LrtTransferJourney:
      type: object
      properties:
        type:
          type: string
          enum: [transfer]
        transferStation:
          type: string
        legs:
          type: array
          items:
            $ref: '#/components/schemas/LrtDirectJourney'
          minItems: 2
          maxItems: 2
      required: [type, transferStation, legs]

    LrtJourneyEnvelope:
      type: object
      properties:
        data:
          oneOf:
            - $ref: '#/components/schemas/LrtDirectJourney'
            - $ref: '#/components/schemas/LrtTransferJourney'
        error:
          type: 'null'
      required: [data, error]

    # ── MRT Station ──────────────────────────────────────
    MrtStation:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
      required: [id, slug, name]

    MrtStationsEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MrtStation'
        error:
          type: 'null'
      required: [data, error]

    # ── MRT Fare/Schedule ────────────────────────────────
    MrtFareData:
      type: object
      properties:
        fare:
          type: integer
        timeEstimation:
          type: integer
          description: Estimated travel time in minutes
        direction:
          type: object
          properties:
            start:
              type: string
            end:
              type: string
          required: [start, end]
        headingTowards:
          type: string
        schedule:
          type: object
          properties:
            weekdays:
              type: array
              items:
                type: string
            weekends:
              type: array
              items:
                type: string
          required: [weekdays, weekends]
      required: [fare, timeEstimation, direction, headingTowards, schedule]

    MrtFareEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MrtFareData'
        error:
          type: 'null'
      required: [data, error]

    # ── Error envelope (KRL) ─────────────────────────────
    ErrorBody:
      type: object
      properties:
        status:
          type: integer
        message:
          type: string
      required: [status, message]

    ErrorEnvelope:
      type: object
      properties:
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ErrorBody'
      required: [data, error]


